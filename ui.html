<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Inter, sans-serif; padding: 20px; color: #333; }
    h3 { margin-top: 0; margin-bottom: 8px; }
    p { font-size: 12px; color: #666; margin-bottom: 20px; line-height: 1.4; }
    
    .upload-box {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 20px;
      background: #fafafa;
      transition: all 0.2s;
    }
    .upload-box:hover { border-color: #999; background: #f0f0f0; }
    
    /* Skrytý input, stylujeme label */
    input[type="file"] { display: none; }
    
    .btn { 
      display: inline-block;
      padding: 10px 20px; 
      background: #18A0FB; 
      color: white; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 500;
      font-size: 13px;
    }
    .btn:hover { background: #007BE5; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      display: none;
    }
    .status.info { background: #e0f2ff; color: #004488; display: block; }
    .status.error { background: #ffe0e0; color: #880000; display: block; }
    .status.success { background: #e0ffe0; color: #006600; display: block; }

    ul { text-align: left; font-size: 11px; color: #555; margin-top: 10px; }
    li { margin-bottom: 4px; }
    .found { color: #00aa00; font-weight: bold; }
    .missing { color: #cc0000; }
  </style>
</head>
<body>
  <h3>DTCG Auto-Import</h3>
  <p>Vyber složku, která obsahuje soubory:<br>
  <b>theme.dtcg.json</b>, <b>light.dtcg.json</b> a <b>dark.dtcg.json</b>.</p>

  <label class="upload-box">
    <div style="margin-bottom: 10px; font-weight: bold; font-size: 14px;">📁 Vybrat složku s tokeny</div>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
    <div style="font-size: 11px; color: #888;">Klikni sem pro výběr</div>
  </label>

  <div id="fileList"></div>
  <button id="btnRun" class="btn" style="width: 100%; display: none;">🚀 Spustit Import</button>
  <div id="status" class="status"></div>

  <script>
    const expectedFiles = {
      'theme.dtcg.json': 'definitions',
      'light.dtcg.json': 'light',
      'dark.dtcg.json': 'dark'
    };

    let filesMap = {};
    const btnRun = document.getElementById('btnRun');
    const statusDiv = document.getElementById('status');
    const fileListDiv = document.getElementById('fileList');

    document.getElementById('folderInput').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      filesMap = {};
      let foundCount = 0;
      let html = '<ul>';

      // Projdeme soubory a najdeme ty správné
      for (const [name, mode] of Object.entries(expectedFiles)) {
        const file = files.find(f => f.name.toLowerCase() === name.toLowerCase());
        if (file) {
          filesMap[mode] = file;
          html += `<li class="found">✓ ${name}</li>`;
          foundCount++;
        } else {
          html += `<li class="missing">✕ ${name} (nenalezeno)</li>`;
        }
      }
      html += '</ul>';
      fileListDiv.innerHTML = html;

      // Povolit tlačítko, pokud máme alespoň theme (definice)
      if (filesMap['definitions']) {
        btnRun.style.display = 'block';
        setStatus(`Nalezeno ${foundCount} souborů. Připraveno k importu.`, 'info');
      } else {
        btnRun.style.display = 'none';
        setStatus('Chybí soubor theme.dtcg.json, který je nutný pro definice.', 'error');
      }
    });

    // Helper pro čtení JSONu
    const readJson = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try { resolve(JSON.parse(e.target.result)); } 
        catch (err) { reject(`Chyba parsování JSON: ${file.name}`); }
      };
      reader.onerror = () => reject(`Chyba čtení: ${file.name}`);
      reader.readAsText(file);
    });

    btnRun.onclick = async () => {
      btnRun.disabled = true;
      btnRun.innerText = "Načítání souborů...";
      setStatus("Čtu soubory...", "info");

      try {
        const payload = {};
        
        // Načteme obsah souborů
        if (filesMap['definitions']) payload.definitions = await readJson(filesMap['definitions']);
        if (filesMap['light']) payload.light = await readJson(filesMap['light']);
        if (filesMap['dark']) payload.dark = await readJson(filesMap['dark']);

        // Pošleme vše najednou do code.ts
        parent.postMessage({ pluginMessage: { type: 'run-automation', payload } }, '*');
        
        btnRun.innerText = "Pracuji...";
      } catch (err) {
        setStatus(err, 'error');
        btnRun.disabled = false;
        btnRun.innerText = "🚀 Spustit Import";
      }
    };

    function setStatus(msg, type) {
      statusDiv.className = `status ${type}`;
      statusDiv.innerText = msg;
    }

    // Posloucháme zprávy z pluginu (např. o dokončení)
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg && msg.type === 'status') {
        setStatus(msg.message, 'info');
      }
      if (msg && msg.type === 'complete') {
        setStatus(msg.message, 'success');
        btnRun.innerText = "Hotovo";
        btnRun.disabled = false;
      }
    };
  </script>
</body>
</html>
